<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

</head>

<body>

<canvas id="renderCanvas"></canvas>

<div id="hud">

<div id="stats">

<div>Score: <span id="score">0</span></div>

<div>Accuracy: <span id="accuracy">100%</span></div>

<div>Hits: <span id="hits">0</span></div>

<div>Misses: <span id="misses">0</span></div>

<div>Time: <span id="timer">30</span></div>

</div>

<div id="crosshair">

<div class="h"></div>

<div class="v"></div>

</div>

</div>

<div id="menu">

<h1>Aim Trainer</h1>

<button id="staticBtn">Static Practice</button>

<button id="trackingBtn">Tracking Practice</button>

<button id="sniperBtn">Sniper Practice</button>

<p>Press M anytime to open this menu.</p>

</div>

<script src="script.js"></script>

</body>
</html>
